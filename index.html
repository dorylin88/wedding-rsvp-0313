<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding RSVP</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #fffde7 0%, #fff8e1 50%, #fffde7 100%);
  color: #4a4030;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 40px 35px;
  box-shadow: 0 8px 32px rgba(200,170,80,0.15);
  border: 1px solid #ffe082;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}
.header h1 {
  font-size: 1.8em;
  color: #b8860b;
  margin-bottom: 8px;
}
.header p {
  color: #a08030;
  font-size: 0.95em;
  line-height: 1.6;
}
.header .date-info {
  margin-top: 12px;
  background: linear-gradient(135deg, #fff8e1, #ffe082);
  display: inline-block;
  padding: 8px 20px;
  border-radius: 20px;
  font-weight: bold;
  color: #8d6e00;
}

.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-weight: bold;
  color: #7a6020;
  margin-bottom: 6px;
  font-size: 0.95em;
}
.form-group label .required {
  color: #e57373;
  margin-left: 2px;
}
.form-group input[type="text"],
.form-group input[type="number"],
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #ffe082;
  border-radius: 10px;
  font-size: 1em;
  background: #fffef8;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: #ffb300;
  outline: none;
  box-shadow: 0 0 8px rgba(255,179,0,0.25);
}
.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.radio-group {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.radio-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: normal;
  cursor: pointer;
  background: #fffef8;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid #ffe082;
  transition: all 0.2s;
}
.radio-group label:hover {
  background: #fff8e1;
}
.radio-group input[type="radio"]:checked + span {
  color: #b8860b;
  font-weight: bold;
}
.radio-group label:has(input:checked) {
  border-color: #ffb300;
  background: linear-gradient(135deg, #fff8e1, #ffe082);
}

.submit-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #ffd54f, #ffb300);
  color: #5d4200;
  border: none;
  border-radius: 12px;
  font-size: 1.1em;
  font-weight: bold;
  cursor: pointer;
  margin-top: 25px;
  box-shadow: 0 4px 15px rgba(255,179,0,0.3);
  transition: all 0.3s;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,179,0,0.4);
}
.submit-btn:active {
  transform: translateY(0);
}
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.success-msg {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.success-msg h2 {
  color: #b8860b;
  margin-bottom: 10px;
}
.success-msg p {
  color: #a08030;
  line-height: 1.6;
}

.note {
  text-align: center;
  margin-top: 20px;
  font-size: 0.85em;
  color: #bbb;
}

.conditional { display: none; }
.conditional.show { display: block; }
</style>
</head>
<body>

<div class="container">
  <div id="formSection">
    <div class="header">
      <h1>🌸 We're Getting Married 🌿</h1>
      <p>Vincent &amp; Dory 誠摯邀請您參加我們的婚禮<br>請填寫以下表單，讓我們為您安排最好的座位 💛</p>
      <div class="date-info">📅 2027 年 3 月 ｜ 📍 The畔</div>
    </div>

    <form id="rsvpForm" onsubmit="submitForm(event)">
      <div class="form-group">
        <label>姓名 <span class="required">*</span></label>
        <input type="text" id="name" required placeholder="請輸入您的姓名">
      </div>

      <div class="form-group">
        <label>關係 <span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="side" value="男方親友" required><span>男方親友</span></label>
          <label><input type="radio" name="side" value="女方親友"><span>女方親友</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>是否出席 <span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="attend" value="出席" required onchange="toggleAttendFields()"><span>🎉 開心出席</span></label>
          <label><input type="radio" name="attend" value="不克出席" onchange="toggleAttendFields()"><span>😢 不克出席</span></label>
        </div>
      </div>

      <div id="attendFields" class="conditional">
        <div class="form-group">
          <label>攜伴人數（含本人）<span class="required">*</span></label>
          <input type="number" id="guests" min="1" max="10" value="1">
        </div>

        <div class="form-group">
          <label>素食需求</label>
          <div class="radio-group">
            <label><input type="radio" name="vegetarian" value="無" checked><span>無</span></label>
            <label><input type="radio" name="vegetarian" value="全素"><span>全素</span></label>
            <label><input type="radio" name="vegetarian" value="蛋奶素"><span>蛋奶素</span></label>
          </div>
        </div>

        <div class="form-group">
          <label>素食人數</label>
          <input type="number" id="vegCount" min="0" max="10" value="0">
        </div>

        <div class="form-group">
          <label>兒童椅需求</label>
          <input type="number" id="kidChair" min="0" max="5" value="0">
        </div>
      </div>

      <div class="form-group">
        <label>祝福留言 💬</label>
        <textarea id="message" placeholder="給新人的祝福話語（選填）"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">📨 送出回覆</button>
    </form>
  </div>

  <div id="successSection" class="success-msg">
    <h2>🎊 感謝您的回覆！</h2>
    <p>我們已收到您的回覆<br>期待與您共享這美好的一天 💛</p>
    <p style="margin-top:20px;font-size:0.9em;color:#ccc;">— Vincent &amp; Dory —</p>
  </div>
</div>

<p class="note">此表單資料將安全傳送至 Google Sheet 保存</p>

<script>
// 部署後將你的 Apps Script Web App URL 貼在這裡
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

function toggleAttendFields() {
  const attend = document.querySelector('input[name="attend"]:checked');
  const fields = document.getElementById('attendFields');
  if (attend && attend.value === '出席') {
    fields.classList.add('show');
  } else {
    fields.classList.remove('show');
  }
}

async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 送出中...';

  const attend = document.querySelector('input[name="attend"]:checked').value;
  const side = document.querySelector('input[name="side"]:checked').value;
  const vegetarian = document.querySelector('input[name="vegetarian"]:checked');

  const data = {
    name: document.getElementById('name').value.trim(),
    side: side,
    attend: attend,
    guests: attend === '出席' ? (document.getElementById('guests').value || '1') : '0',
    vegetarian: attend === '出席' && vegetarian ? vegetarian.value : '無',
    vegCount: attend === '出席' ? (document.getElementById('vegCount').value || '0') : '0',
    kidChair: attend === '出席' ? (document.getElementById('kidChair').value || '0') : '0',
    message: document.getElementById('message').value.trim()
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
  } catch (err) {
    alert('送出失敗，請稍後再試或聯繫新人 🙏');
    btn.disabled = false;
    btn.textContent = '📨 送出回覆';
  }
}
</script>

</body>
</html>
